<script>
    // --- 1. GLOBAL DEĞİŞKENLER (UNITY'NİN ARADIĞI KRİTİK ALANLAR) ---
    const NO_DATA = 'no data';
    
    // Unity C# tarafı bu değişkenleri doğrudan window'da arar
    var environmentData = NO_DATA;
    var cloudSaves = NO_DATA;
    var playerData = NO_DATA;
    var paymentsData = NO_DATA;
    var statsSaves = NO_DATA;
    
    var player = null;
    var payments = null;
    var initGame = false;
    var ygGameInstance = null;
    var ysdk = null;
    var isPausedGame = false;

    // --- 2. LOG VE INIT FONKSİYONLARI (HATALARI ÇÖZEN KISIM) ---
    
    // Uncaught ReferenceError: LogStyledMessage is not defined hatası için:
    function LogStyledMessage(message, style) {
        if (style) {
            console.log('%c' + message, style);
        } else {
            console.log('%c' + message, 'color: #FFDF73; background-color: #454545; padding: 2px 5px; border-radius: 2px;');
        }
    }

    // Uncaught ReferenceError: InitGame is not defined hatası için:
    function InitGame() {
        LogStyledMessage('InitGame: Oyun başlatma sinyali alındı.');
        initGame = true;
        
        // SDK Hazır mesajını Unity'ye geri gönder
        setTimeout(function() {
            if (ygGameInstance) {
                ygGameInstance.SendMessage('YG2Instance', 'InitSDKComplete');
            }
        }, 500);
    }

    // --- 3. DİLİ İNGİLİZCEYE ZORLA VE ORTAM VERİSİ ---
    var fakeEnvData = {
        "language": "en", 
        "domain": "default_domain",
        "deviceType": "desktop",
        "isMobile": false,
        "isDesktop": true,
        "isTablet": false,
        "isTV": false,
        "appID": "offline_app",
        "browserLang": "en",
        "payload": null,
        "platform": navigator.platform,
        "browser": "Chrome"
    };
    environmentData = JSON.stringify(fakeEnvData);

    // --- 4. UNITY KONFİGÜRASYONU ---
    const buildUrl = "https://cdn.jsdelivr.net/gh/z799gs/550o8@main/Build";
    const loaderUrl = buildUrl + "/Dune.loader.js";
    const config = {
        dataUrl: buildUrl + "/Dune.data.br",
        frameworkUrl: buildUrl + "/Dune.framework.js",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "CloneDuneDEV",
        productVersion: "1.0"
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector('.spinner');

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
    }

    loadingCover.style.background = "url('https://cdn.jsdelivr.net/gh/z799gs/550o8@main/Images/background.png') center / cover";
    loadingCover.style.display = "";

    // --- 5. WASM BİRLEŞTİRME (6 PARÇA) ---
    function loadAndMergeFiles(files, callback) {
        var mergedBlob = [];
        var loadNextFile = function(index) {
            if (index < files.length) {
                var file = files[index];
                var xhr = new XMLHttpRequest();
                xhr.open('GET', buildUrl + "/" + file, true);
                xhr.responseType = 'arraybuffer';
                xhr.onload = function() {
                    if (this.status === 200) {
                        mergedBlob.push(new Uint8Array(this.response));
                        loadNextFile(index + 1);
                    } else {
                        LogStyledMessage("Parça yüklenemedi: " + file);
                        loadNextFile(index + 1);
                    }
                };
                xhr.send();
            } else {
                var blob = new Blob(mergedBlob);
                callback(blob);
            }
        };
        loadNextFile(0);
    }

    var wasmParts = [
        "Dune.wasm.br.part1", "Dune.wasm.br.part2", "Dune.wasm.br.part3",
        "Dune.wasm.br.part4", "Dune.wasm.br.part5", "Dune.wasm.br.part6"
    ];

    // --- 6. UNITY'Yİ ZORLA BAŞLAT ---
    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        loadAndMergeFiles(wasmParts, function(blob) {
            config.codeUrl = URL.createObjectURL(blob);
            
            createUnityInstance(canvas, config, (progress) => {
                spinner.style.display = "none";
                progressBarEmpty.style.display = "";
                progressBarFull.style.width = (100 * Math.max(progress, 0.05)) + "%";
            }).then((unityInstance) => {
                ygGameInstance = unityInstance;
                loadingCover.style.display = "none";
                LogStyledMessage("Unity hazır, Fake SDK moduna geçiliyor.");
                
                // Unity'ye SDK verilerini hemen tanıt
                InitFakeYSDK();
            }).catch((message) => {
                console.error(message);
            });
        });
    };
    document.body.appendChild(script);

    // --- 7. FAKE SDK / YSDK BYPASS FONKSİYONLARI ---
    
    function YG2Instance(method, arg) {
        if (!ygGameInstance) return;
        ygGameInstance.SendMessage('YG2Instance', method, arg);
    }

    function InitFakeYSDK() {
        RequestingEnvironmentData();
        InitPlayer();
        LoadCloud();
        GetStats();
        InitPayments();
    }

    function RequestingEnvironmentData() {
        YG2Instance('SetEnvirData', environmentData);
        return Promise.resolve(environmentData);
    }

    function InitPlayer() {
        var fakePlayer = {
            "playerAuth": "resolved",
            "playerName": "Okul_Gamer",
            "playerId": "local_1",
            "playerPhoto": "null",
            "payingStatus": "unknown"
        };
        playerData = JSON.stringify(fakePlayer);
        YG2Instance('SetAuth', playerData);
        return Promise.resolve(playerData);
    }

    function LoadCloud() {
        YG2Instance('SetLoadSaves', NO_DATA);
        return Promise.resolve(NO_DATA);
    }

    function SaveCloud(jsonData) {
        LogStyledMessage("Save tetiklendi: " + jsonData.substring(0, 20) + "...");
    }

    function GetStats() {
        YG2Instance('ReceiveStats', NO_DATA);
        return Promise.resolve(NO_DATA);
    }

    // Reklam Bypass (Saniyeler içinde "izlendi" olarak döner)
    function InterAdvShow() {
        YG2Instance('OpenInterAdv');
        setTimeout(() => YG2Instance('CloseInterAdv', 'true'), 300);
    }

    function RewardedAdvShow(id) {
        YG2Instance('OpenRewardedAdv');
        setTimeout(() => {
            YG2Instance('CloseRewardedAdv');
            YG2Instance('RewardAdv', id);
        }, 300);
    }

    // Diğer zorunlu boşluklar
    function SetStats() {}
    function InitPayments() { YG2Instance('PaymentsEntries', NO_DATA); }
    function BuyPayments(id) { YG2Instance('OnPurchaseFailed', id); }
    function ConsumePurchase() {}
    function ConsumePurchases() {}
    function SetLeaderboard() {}
    function GetLeaderboard(nameLB) {
        YG2Instance('LeaderboardEntries', JSON.stringify({
            technoName: nameLB, entries: "no data", ranks:[], photos:[], names:[], scores:[], uniqueIDs:[]
        }));
    }
    function OpenAuthDialog() { InitPlayer(); }

    function FocusGame() { window.focus(); canvas.focus(); }
    window.addEventListener('pointerdown', FocusGame);
    window.addEventListener('touchstart', FocusGame);

</script>

<!-- Sticky Bottom Center Ad (728x90) with Smooth Slide-Out and Reappearance -->
<style>
  /* Container: Bottom center, fixed, with overflow hidden */
  #ad-container {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(728px, calc(100% - 20px)); /* 728px, 10px margin on mobile */
    height: 90px;
    background: rgba(0, 0, 0, 0.90);
    display: none;
    z-index: 99999;
    border-radius: 0; /* Sharp corners */
    overflow: hidden;
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
    box-sizing: border-box;
    transition: transform 0.5s ease-in-out; /* Smooth slide-in/out animation */
  }

  /* Slide-out animation */
  #ad-container.hidden {
    transform: translate(-50%, 100%); /* Slide down out of view */
  }

  #ad-iframe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 745px; /* Updated width */
    height: 90px; /* Updated height */
    border: 0;
    display: block;
    overflow: hidden;
    pointer-events: auto;
    box-sizing: content-box;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  
  #ad-iframe::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }

  /* Close button with arrow */
  #close-ad {
    position: absolute;
    top: 6px;
    right: 8px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    padding: 5px 9px;
    font-size: 13px;
    border-radius: 4px;
    cursor: not-allowed;
    opacity: 0.72;
    z-index: 100000;
    display: flex;
    align-items: center;
  }
  #close-ad.enabled {
    cursor: pointer;
    opacity: 1;
  }
  #close-ad::before {
    content: '↓'; /* Down arrow for bottom ad */
    margin-right: 4px;
  }

  /* Right mask for scrollbar */
  #ad-right-mask {
    position: absolute;
    top: 0;
    right: 0;
    width: 12px;
    height: 100%;
    pointer-events: none;
    background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
    z-index: 99999;
  }

  /* Mobile adjustments */
  @media (max-width: 440px) {
    #ad-container {
      width: calc(100% - 12px);
      left: 50%;
      transform: translateX(-50%);
      border-radius: 0; /* Sharp corners on mobile */
    }
    #ad-iframe {
      width: 728px;
    }
  }
</style>

<div id="ad-container" aria-hidden="false" role="dialog" aria-label="Advertisement" style="display: block;">
  <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbw60Tp6nuqThxAuU8ZN1JIuPtjHoW2Uqq3fQy0CvrycN0O2AQwhRT5EDv73hh2FhXEF/exec" width="768px" height="95px" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin"></iframe>
  <button id="close-ad" disabled="">Close (6)</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 150000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↓';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>

<style>

  position: fixed;

  background-color: #ffcc00;
  padding: 10px 20px;

}

  color: #000;
  text-decoration: underline;
  font-weight: bold;
}

#close-banner-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
  line-height: 1;
  display: none; /* Hidden by default until JS triggers it */
}
</style>
<script>
// Function to hide the banner and start the 60-second timer
function dismissBanner() {
  const banner = document.getElementById('sticky-promo-banner');
  const closeBtn = document.getElementById('close-banner-btn');

  // Hide the banner visually so it no longer overlays the content
  banner.style.visibility = 'hidden'; 

  // Wait exactly 60 seconds (60000 milliseconds)
  setTimeout(function() {
    // Show the banner and the "x" button again
    banner.style.visibility = 'visible';
    closeBtn.style.display = 'inline-block';
  }, 60000); 
}

// Ensure the "X" button is visible when the page first loads
window.onload = function() {
  document.getElementById('close-banner-btn').style.display = 'inline-block';
};
</script>

<script>
    (function() {
        const link = document.getElementById('timed-hyperlink');
        
        function toggleLink() {
            // Show the link immediately
            link.style.display = 'block';
            
            // Hide it after exactly 7 seconds
            setTimeout(() => {
                link.style.display = 'none';
            }, 7000);
        }

        // Run the cycle once immediately, then every 20 seconds
        toggleLink();
        setInterval(toggleLink, 20000);
    })();
</script>
