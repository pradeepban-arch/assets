<!-- Sticky Bottom Center Ad (728x90) with Smooth Slide-Out and Reappearance -->
<style>
  /* Container: Bottom center, fixed, with overflow hidden */
  #ad-container {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(728px, calc(100% - 20px)); /* 728px, 10px margin on mobile */
    height: 90px;
    background: rgba(0, 0, 0, 0.90);
    display: none;
    z-index: 99999;
    border-radius: 0; /* Sharp corners */
    overflow: hidden;
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
    box-sizing: border-box;
    transition: transform 0.5s ease-in-out; /* Smooth slide-in/out animation */
  }

  /* Slide-out animation */
  #ad-container.hidden {
    transform: translate(-50%, 100%); /* Slide down out of view */
  }

  #ad-iframe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 745px; /* Updated width */
    height: 90px; /* Updated height */
    border: 0;
    display: block;
    overflow: hidden;
    pointer-events: auto;
    box-sizing: content-box;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  
  #ad-iframe::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }

  /* Close button with arrow */
  #close-ad {
    position: absolute;
    top: 6px;
    right: 8px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    padding: 5px 9px;
    font-size: 13px;
    border-radius: 4px;

    opacity: 0.72;
    z-index: 100000;
    display: flex;
    align-items: center;
  }
  #close-ad.enabled {

    opacity: 1;
  }
  #close-ad::before {
    content: '↓'; /* Down arrow for bottom ad */
    margin-right: 4px;
  }

  /* Right mask for scrollbar */
  #ad-right-mask {
    position: absolute;
    top: 0;

    pointer-events: none;
    background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));

<div id="ad-container" aria-hidden="false" role="dialog" aria-label="Advertisement" style="display: block;">
  <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbzNG4z_PlG6Ke_bX5wSPKK2uBRB3IY9ouVzqM1shucYhSTvsJWRmyMyZaaC2z5S3ADN/exec" width="768px" height="95px" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin"></iframe>
  <button id="close-ad" class="enabled">Close ↓</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 60000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↓';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>

<style>
.corner-banner {
  position: fixed;
  top: 0;
  right: 0;
  z-index: 9999; /* Ensures it sits above all other content */
  background-color: #ffcc00;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom-left-radius: 8px;
  box-shadow: -2px 2px 10px rgba(0,0,0,0.2);
}

.corner-banner a {
  color: #000;
  text-decoration: underline;
  font-weight: bold;
}

#close-banner-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
  line-height: 1;
  display: none; /* Hidden by default until JS triggers it */
}
</style>
<script>
// Function to hide the banner and start the 60-second timer
function dismissBanner() {
  const banner = document.getElementById('sticky-promo-banner');
  const closeBtn = document.getElementById('close-banner-btn');

  // Hide the banner visually so it no longer overlays the content
  banner.style.visibility = 'hidden'; 

  // Wait exactly 60 seconds (60000 milliseconds)
  setTimeout(function() {
    // Show the banner and the "x" button again
    banner.style.visibility = 'visible';
    closeBtn.style.display = 'inline-block';
  }, 60000); 
}

// Ensure the "X" button is visible when the page first loads
window.onload = function() {
  document.getElementById('close-banner-btn').style.display = 'inline-block';
};
</script>

<script>
    (function() {
        const link = document.getElementById('timed-hyperlink');
        
        function toggleLink() {
            // Show the link immediately
            link.style.display = 'block';
            
            // Hide it after exactly 7 seconds
            setTimeout(() => {
                link.style.display = 'none';
            }, 7000);
        }

        // Run the cycle once immediately, then every 20 seconds
        toggleLink();
        setInterval(toggleLink, 20000);
    })();
</script>
